<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="referrer" content="no-referrer">
<title>Autores PAU · Historia de la Filosofía</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
:root {
  --bg-primary: #F5F0E8;
  --bg-secondary: #EDE7DB;
  --bg-card: #FAF7F2;
  --bg-card-hover: #FFFFFF;
  --bg-accent: #E8DFD0;
  --text-primary: #2C2418;
  --text-secondary: #6B5D4D;
  --text-tertiary: #9C8B78;
  --accent-warm: #C4956A;
  --accent-warm-light: #D4A87A;
  --accent-deep: #8B6E4E;
  --accent-subtle: #B8A692;
  --border-light: #E0D6C8;
  --border-medium: #D0C4B2;
  --shadow-soft: 0 2px 12px rgba(44, 36, 24, 0.06);
  --shadow-medium: 0 4px 24px rgba(44, 36, 24, 0.1);
  --shadow-lift: 0 8px 40px rgba(44, 36, 24, 0.12);
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* ── Decorative background ── */
body::before {
  content: '';
  position: fixed;
  top: -200px;
  right: -200px;
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(196,149,106,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

body::after {
  content: '';
  position: fixed;
  bottom: -300px;
  left: -200px;
  width: 800px;
  height: 800px;
  background: radial-gradient(circle, rgba(139,110,78,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(245, 240, 232, 0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-light);
  padding: 0 2rem;
}

.header-inner {
  max-width: 1200px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 72px;
}

.logo {
  display: flex;
  align-items: center;
  gap: 14px;
}

.logo-icon {
  width: 42px;
  height: 42px;
  background: linear-gradient(135deg, var(--accent-warm) 0%, var(--accent-deep) 100%);
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  box-shadow: 0 2px 8px rgba(196,149,106,0.3);
}

.logo-text {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.02em;
}

.logo-text span {
  color: var(--accent-warm);
}

.header-subtitle {
  font-size: 0.82rem;
  color: var(--text-tertiary);
  font-weight: 400;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

/* ── Counters bar ── */
.counters-bar {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
  position: relative;
  z-index: 1;
}

.counters-inner {
  display: flex;
  justify-content: center;
  gap: 2.5rem;
  padding: 1rem 0 0;
}

.counter-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.88rem;
  color: var(--text-tertiary);
}

.counter-item svg {
  width: 16px;
  height: 16px;
  color: var(--accent-warm);
  flex-shrink: 0;
}

.counter-number {
  font-weight: 600;
  color: var(--accent-deep);
  font-size: 0.95rem;
}

/* ── Hero ── */
.hero {
  max-width: 1200px;
  margin: 0 auto;
  padding: 4rem 2rem 3rem;
  position: relative;
  z-index: 1;
  text-align: center;
}

.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.4rem, 5vw, 3.6rem);
  font-weight: 700;
  line-height: 1.15;
  color: var(--text-primary);
  letter-spacing: -0.03em;
  max-width: 800px;
  margin: 0 auto;
}

.hero h1 em {
  font-style: italic;
  color: var(--accent-warm);
}

.hero-author {
  margin-top: 1.5rem;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1.05rem;
  font-weight: 500;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}

.hero-center {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.95rem;
  font-weight: 400;
  color: var(--text-secondary);
  margin-top: 0.3rem;
}

.hero-description {
  margin-top: 1.2rem;
  font-size: 1.15rem;
  color: var(--text-secondary);
  max-width: 560px;
  margin-left: auto;
  margin-right: auto;
  font-weight: 300;
  line-height: 1.7;
}

.hero-line {
  margin-top: 2.5rem;
  width: 60px;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-warm), transparent);
  border-radius: 2px;
  margin-left: auto;
  margin-right: auto;
}

/* ── Authors grid ── */
.authors-section {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1rem 2rem 4rem;
  position: relative;
  z-index: 1;
}

.authors-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 1.5rem;
}

.author-card {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: all 0.35s cubic-bezier(0.23, 1, 0.32, 1);
  position: relative;
  overflow: hidden;
}

.author-card::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent-warm), var(--accent-warm-light));
  opacity: 0;
  transition: opacity 0.35s ease;
  z-index: 2;
}

.author-card:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-medium);
  box-shadow: var(--shadow-medium);
  transform: translateY(-3px);
}

.author-card:hover::before {
  opacity: 1;
}

.author-card-img {
  width: 100%;
  height: 320px;
  object-fit: contain;
  display: block;
  filter: sepia(15%) saturate(85%);
  transition: filter 0.4s ease, transform 0.5s ease;
  padding: 0.8rem 0.8rem 0;
}

.author-card:hover .author-card-img {
  filter: sepia(0%) saturate(100%);
  transform: scale(1.04);
}

.author-card-img-wrapper {
  overflow: hidden;
  position: relative;
  background: var(--bg-accent);
}

.author-card-img-wrapper::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 30px;
  background: linear-gradient(transparent, var(--bg-card));
  pointer-events: none;
}

.author-card-body {
  padding: 1.2rem 1.5rem 1.5rem;
}

.author-card-icon {
  display: none;
}

.author-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.25rem;
  font-weight: 600;
  color: var(--text-primary);
  margin-bottom: 0.4rem;
  letter-spacing: -0.01em;
}

.author-card-meta {
  font-size: 0.85rem;
  color: var(--text-tertiary);
  font-weight: 400;
}

.author-card-arrow {
  position: absolute;
  bottom: 1.5rem;
  right: 1.5rem;
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--bg-accent);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  color: var(--text-tertiary);
}

.author-card:hover .author-card-arrow {
  background: var(--accent-warm);
  color: white;
  transform: translateX(3px);
}

/* ── Author detail page (overlay) ── */
.author-page {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 200;
  background: var(--bg-primary);
  overflow-y: auto;
  animation: slideIn 0.4s cubic-bezier(0.23, 1, 0.32, 1);
}

.author-page.active {
  display: block;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}

.author-page-header {
  position: sticky;
  top: 0;
  z-index: 210;
  background: rgba(245, 240, 232, 0.9);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border-light);
  padding: 0 2rem;
}

.author-page-header-inner {
  max-width: 1000px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 1rem;
  height: 64px;
}

.back-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  background: none;
  border: 1px solid var(--border-medium);
  border-radius: var(--radius-sm);
  padding: 8px 16px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.9rem;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
}

.back-btn:hover {
  background: var(--bg-card);
  color: var(--text-primary);
  border-color: var(--accent-warm);
}

.author-page-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text-primary);
}

.author-page-content {
  max-width: 1000px;
  margin: 0 auto;
  padding: 2.5rem 2rem 4rem;
}

.files-list {
  display: flex;
  flex-direction: column;
  gap: 0.8rem;
}

.file-item {
  background: var(--bg-card);
  border: 1px solid var(--border-light);
  border-radius: var(--radius-md);
  padding: 1.2rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  transition: all 0.25s ease;
  cursor: pointer;
}

.file-item:hover {
  background: var(--bg-card-hover);
  border-color: var(--border-medium);
  box-shadow: var(--shadow-soft);
}

.file-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, #E8584820, #E8584810);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.file-icon svg {
  width: 22px;
  height: 22px;
  color: #C0392B;
}

.file-info {
  flex: 1;
  min-width: 0;
}

.file-name {
  font-weight: 500;
  color: var(--text-primary);
  font-size: 0.95rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-actions {
  display: flex;
  gap: 0.6rem;
  flex-shrink: 0;
}

.btn-view, .btn-download {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  border-radius: var(--radius-sm);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  border: none;
  text-decoration: none;
}

.btn-view {
  background: linear-gradient(135deg, var(--accent-warm), var(--accent-deep));
  color: white;
}

.btn-view:hover {
  box-shadow: 0 4px 16px rgba(196,149,106,0.35);
  transform: translateY(-1px);
}

.btn-download {
  background: var(--bg-accent);
  color: var(--text-secondary);
  border: 1px solid var(--border-medium);
}

.btn-download:hover {
  background: var(--bg-secondary);
  color: var(--text-primary);
}

/* ── PDF Viewer overlay ── */
.pdf-viewer-overlay {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 300;
  background: rgba(44, 36, 24, 0.6);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  animation: fadeIn 0.3s ease;
}

.pdf-viewer-overlay.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.pdf-viewer-container {
  width: 92vw;
  height: 92vh;
  max-width: 1100px;
  background: white;
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lift);
  display: flex;
  flex-direction: column;
  animation: scaleIn 0.35s cubic-bezier(0.23, 1, 0.32, 1);
  transition: all 0.3s ease;
}

.pdf-viewer-container.maximized {
  width: 100vw;
  height: 100vh;
  max-width: none;
  border-radius: 0;
}

@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}

.pdf-viewer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 1.5rem;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border-light);
}

.pdf-viewer-title {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 60%;
}

.pdf-viewer-actions {
  display: flex;
  gap: 0.5rem;
}

.pdf-viewer-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.82rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
  border: 1px solid var(--border-medium);
  background: white;
  color: var(--text-secondary);
  text-decoration: none;
}

.pdf-viewer-btn:hover {
  background: var(--bg-accent);
  color: var(--text-primary);
}

.pdf-viewer-btn.close-btn {
  background: var(--text-primary);
  color: white;
  border-color: var(--text-primary);
}

.pdf-viewer-btn.close-btn:hover {
  background: var(--accent-deep);
  border-color: var(--accent-deep);
}

.pdf-viewer-frame {
  flex: 1;
  border: none;
  width: 100%;
}

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-tertiary);
}

.empty-state-icon {
  font-size: 3rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}

/* ── Footer ── */
.footer {
  max-width: 1200px;
  margin: 0 auto;
  padding: 2rem;
  text-align: center;
  color: var(--text-tertiary);
  font-size: 0.82rem;
  border-top: 1px solid var(--border-light);
  position: relative;
  z-index: 1;
}

/* ── Responsive ── */
@media (max-width: 768px) {
  .hero h1 { font-size: 2rem; }
  .hero { padding: 2.5rem 1.2rem 2rem; }
  .authors-section { padding: 1rem 1.2rem 3rem; }
  .authors-grid { grid-template-columns: 1fr; }
  .header-subtitle { display: none; }
  .file-item { flex-wrap: wrap; }
  .file-actions { width: 100%; justify-content: flex-end; }
  .pdf-viewer-container { width: 98vw; height: 95vh; border-radius: var(--radius-md); }
  .pdf-viewer-title { max-width: 40%; }
}

/* ── Animations on load ── */
.author-card {
  opacity: 0;
  transform: translateY(20px);
  animation: cardIn 0.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
}

@keyframes cardIn {
  to { opacity: 1; transform: translateY(0); }
}

.author-card:nth-child(1) { animation-delay: 0.05s; }
.author-card:nth-child(2) { animation-delay: 0.1s; }
.author-card:nth-child(3) { animation-delay: 0.15s; }
.author-card:nth-child(4) { animation-delay: 0.2s; }
.author-card:nth-child(5) { animation-delay: 0.25s; }
.author-card:nth-child(6) { animation-delay: 0.3s; }
.author-card:nth-child(7) { animation-delay: 0.35s; }
.author-card:nth-child(8) { animation-delay: 0.4s; }

/* ── Instruction banner ── */
.setup-banner {
  max-width: 1200px;
  margin: 0 auto 2rem;
  padding: 0 2rem;
  position: relative;
  z-index: 1;
}

.setup-banner-inner {
  background: var(--bg-card);
  border: 1px dashed var(--border-medium);
  border-radius: var(--radius-md);
  padding: 1.5rem 2rem;
  display: none;
}

.setup-banner-inner.visible {
  display: block;
}

.setup-banner h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1rem;
  margin-bottom: 0.6rem;
  color: var(--accent-deep);
}

.setup-banner p, .setup-banner code {
  font-size: 0.88rem;
  color: var(--text-secondary);
  line-height: 1.7;
}

.setup-banner code {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg-accent);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.8rem;
}

.setup-banner pre {
  background: var(--bg-secondary);
  border-radius: var(--radius-sm);
  padding: 1rem;
  margin-top: 0.8rem;
  overflow-x: auto;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  line-height: 1.6;
  color: var(--text-secondary);
}
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">φ</div>
      <div>
        <div class="logo-text">Autores <span>PAU</span></div>
      </div>
    </div>
    <div class="header-subtitle">Historia de la Filosofía</div>
  </div>
</header>

<!-- Hero -->
<section class="hero">
  <h1>Textos y materiales de <em>Historia de la Filosofía</em></h1>
  <div class="hero-author">Francisco Jiménez Amor</div>
  <div class="hero-center">I.E.S. Alquipir de Cehegín</div>
  <p class="hero-description">
    Biblioteca de documentos organizados por autor para la preparación de la PAU. 
    Selecciona un autor para acceder a sus textos.
  </p>
  <div class="hero-line"></div>
</section>

<!-- Counters -->
<div class="counters-bar">
  <div class="counters-inner">
    <div class="counter-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      <span>Visitas: <span class="counter-number" id="visitCount">—</span></span>
    </div>
    <div class="counter-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>Descargas: <span class="counter-number" id="downloadCount">—</span></span>
    </div>
  </div>
</div>

<!-- Authors Grid -->
<section class="authors-section">
  <div class="authors-grid" id="authorsGrid"></div>
</section>

<!-- Author Detail Page -->
<div class="author-page" id="authorPage">
  <div class="author-page-header">
    <div class="author-page-header-inner">
      <button class="back-btn" onclick="closePage()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
        Volver
      </button>
      <div class="author-page-title" id="authorPageTitle"></div>
    </div>
  </div>
  <div class="author-page-content">
    <div class="files-list" id="filesList"></div>
  </div>
</div>

<!-- PDF Viewer Overlay -->
<div class="pdf-viewer-overlay" id="pdfViewer">
  <div class="pdf-viewer-container">
    <div class="pdf-viewer-header">
      <div class="pdf-viewer-title" id="pdfViewerTitle"></div>
      <div class="pdf-viewer-actions">
        <button class="pdf-viewer-btn" onclick="toggleMaximize()" id="maximizeBtn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
          Pantalla completa
        </button>
        <a class="pdf-viewer-btn" id="pdfDownloadBtn" href="#" download onclick="registerDownload()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Descargar

//  SISTEMA DE CONTADORES (Visitas y Descargas)
//  
//  Usa un Google Apps Script como backend gratuito.
//  Para activarlo:
//  1. Ve a https://script.google.com y crea un nuevo proyecto
//  2. Pega el código del archivo "contador-apps-script.gs"
//  3. Despliega como "Aplicación web" con acceso "Cualquier persona"
//  4. Copia la URL y pégala abajo en APPS_SCRIPT_URL
// ══════════════════════════════════════════════════════════════════

const APPS_SCRIPT_URL = ''; // https://script.google.com/macros/s/AKfycbwIqobM9_Ka5wOrRpMOKwrH7x6tg7KQIU7-dIh1zDDIx6FrApT8r9JJDKzvH_QGhmTb/exec

// --- Contadores con Apps Script ---
async function loadCounters() {
  if (!APPS_SCRIPT_URL) {
    // Sin Apps Script: usar localStorage como fallback
    const visits = localStorage.getItem('pau_visits') || 0;
    const downloads = localStorage.getItem('pau_downloads') || 0;
    document.getElementById('visitCount').textContent = visits;
    document.getElementById('downloadCount').textContent = downloads;
    // Incrementar visita
    const newVisits = parseInt(visits) + 1;
    localStorage.setItem('pau_visits', newVisits);
    document.getElementById('visitCount').textContent = newVisits;
    return;
  }

  try {
    // Registrar visita y obtener contadores
    const response = await fetch(APPS_SCRIPT_URL + '?action=visit');
    const data = await response.json();
    document.getElementById('visitCount').textContent = data.visits || 0;
    document.getElementById('downloadCount').textContent = data.downloads || 0;
  } catch (e) {
    console.log('Error cargando contadores:', e);
    document.getElementById('visitCount').textContent = '—';
    document.getElementById('downloadCount').textContent = '—';
  }
}

async function registerDownload() {
  if (!APPS_SCRIPT_URL) {
    const downloads = parseInt(localStorage.getItem('pau_downloads') || 0) + 1;
    localStorage.setItem('pau_downloads', downloads);
    document.getElementById('downloadCount').textContent = downloads;
    return;
  }

  try {
    const response = await fetch(APPS_SCRIPT_URL + '?action=download');
    const data = await response.json();
    document.getElementById('downloadCount').textContent = data.downloads || 0;
  } catch (e) {
    console.log('Error registrando descarga:', e);
  }
}

// Cargar contadores al iniciar
loadCounters();
